version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: proshop-nginx
    restart: always
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d
    depends_on:
      - frontend
      - backend
    networks:
      - proshop-network
  mongo:
    image: mongo:6
    container_name: proshop-mongo
    restart: always
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    networks:
      - proshop-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: proshop-backend
    restart: always
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/proshop
      JWT_SECRET: abc123
      PAYPAL_CLIENT_ID: sb
    depends_on:
      - mongo
    networks:
      - proshop-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: proshop-frontend
    restart: always
    ports:
      - '3000:80'
    depends_on:
      - backend
    networks:
      - proshop-network

volumes:
  mongo-data:

networks:
  proshop-network:
    driver: bridge
